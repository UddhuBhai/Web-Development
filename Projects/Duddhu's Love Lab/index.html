<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Duddhu's Love Lab ❤️</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">


    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

    <div class="overlay"></div>

    <div class="container">

        <div class="card">

            <h1>Duddhu's Love Lab ❤️</h1>

            <p class="subtitle">

                Where hearts meet, fate speaks,
                and every love story begins
                with two names.

            </p>

            <div class="input-box">

                <input
                    type="text"
                    id="yourName"
                    placeholder="Your Name">

            </div>

            <div class="heart">

                <i class="fa-solid fa-heart"></i>

            </div>

            <div class="input-box">

                <input
                    type="text"
                    id="crushName"
                    placeholder="Crush Name">

            </div>

            <button id="calculateBtn">

                Calculate Fate ❤️

            </button>

            <div id="loading">

                Consulting the stars...

            </div>

            <div id="result">

                <h2 id="percentage">

                    ❤️ 0%

                </h2>

                <div class="progress">

                    <div class="progress-bar"></div>

                </div>

                <p id="message">

                    Enter two names to begin.

                </p>

            </div>

        </div>

    </div>

<footer>
    Made with ❤️ by <span>UddhuBhai</span><br>
    © 2026 UddhuBhai. All Rights Reserved.
</footer>

    <script src="script.js"></script>

</body>

</html>
