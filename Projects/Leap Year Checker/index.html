<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will the leap year live?</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Cormorant+Garamond:wght@300;400;600&family=Special+Elite&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="book">

        <h1>DEATH NOTE</h1>

        <p class="subtitle">
            Write a year.<br>
            Justice will decide its fate.
        </p>

        <input
            type="number"
            id="year"
            placeholder="Write a year...">

        <button onclick="judgeYear()">
            WRITE
        </button>

        <div id="result"></div>

        <p class="footer">
            Justice is merely perspective.
        </p>

    </div>

    <script src="script.js"></script>

</body>

</html>
